<html>
<head>
    <title>Student Registration Form</title>
</head>
    <body>
        <h2>Student Registration Form</h2>

        <form id="regForm" onsubmit="return validateAndSubmit()">
            <label>Name:</label><br>
            <input type="text" id="name" placeholder="Enter Full Name"><br><br>

            <label>Roll No:</label><br>
            <input type="text" id="roll" placeholder="7-digit Roll No."><br><br>

            <label>Date Of Birth</label><br>
            <input type="date" id="dob"><br><br>

            <label>Address</label><br>
            <textarea id="address" rows="4" cols="30"></textarea><br><br>

            <label>Course:</label><br>
            <select id="course">
                <option value="">Select Course</option>
                <option value="bcom">B.Com(Hons)</option>
                <option value="bsc">B.Sc Computer Science</option>
                <option value="ba">B.A. Programme</option>
            </select><br><br>

            <label>Gender:</label>
            <input type="radio" name="gender" value="male">Male
            <input type="radio" name="gender" value="female">Female<br><br>

            <label>Intrests:</label>
            <input type="checkbox" name="interest" value="coding">Coding
            <input type="checkbox" name="interest" value="Sports">Sports
            <input type="checkbox" name="interest" value="music">Music<br><br>

            <input type="reset" value="reset">
            <input type="submit" value="submit">
        </form>
        
        <script>
            function validateAndSubmit() {
        let name = document.getElementById('name').value;
        let roll = document.getElementById('roll').value;
        let dob = document.getElementById('dob').value;

        // 1. Roll number: 7-digit numeric 
        if (isNaN(roll) || roll.length !== 7) {
            alert("Roll number must be exactly 7 digits.");
            return false;
        }

        // 2. Name: Alphabetical only 
        let namePattern = /^[A-Za-z\s]+$/;
        if (!namePattern.test(name)) {
            alert("Name must contain only alphabets.");
            return false;
        }

        // 3. Non-empty fields like DOB 
        if (dob === "") {
            alert("Please select your Date of Birth.");
            return false;
        }

        // Success message required by HTML Q7 
        alert("Form submitted");
        return true; 
    }
        </script>
    </body>
</html>
